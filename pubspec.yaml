name: movie_app
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  dio: ^5.9.2
  flutter_spinkit: ^5.2.2
  shared_preferences: ^2.5.4

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo_panda_claque.png"

flutter_native_splash:
  color: "#0D0D1F"
  image: assets/icon/icon.png

  android: true
  ios: true

  android_12:
    image: assets/icon/logo_panda_claque.png
    icon_background_color: "#0D0D1F"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/